defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: random # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  corruption:
    type: gaussian_noise
    kernel_size: 1     # gaussian_blur only; 1 = no-op (odd integer; smaller-than-1 becomes no-op)
    factor: 1.0        # resize only; 1.0 = no-op
    std: 0.0 # 0 disables; pixel-space std converted for ImageNet-normalized tensors
    apply_to:
      - pixels
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state
          
output:
  filename: pusht_results.txt
